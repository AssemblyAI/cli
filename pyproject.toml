[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "assemblyai-cli"
version = "0.1.0"
description = "Command-line interface for AssemblyAI"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.12",
    "assemblyai>=0.34",
    "rich>=13.0",
    "keyring>=24.0",
    "platformdirs>=4.0",
    "tomli-w>=1.0",
    "websockets>=13",
    "sounddevice>=0.5",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.11", "mypy>=1.10", "pre-commit>=4.0"]

[project.scripts]
aai = "assemblyai_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["assemblyai_cli"]

[tool.hatch.build.targets.wheel.force-include]
"assemblyai_cli/templates/transcribe.py.tmpl" = "assemblyai_cli/templates/transcribe.py.tmpl"
"assemblyai_cli/templates/stream.py.tmpl" = "assemblyai_cli/templates/stream.py.tmpl"
"assemblyai_cli/templates/agent.py.tmpl" = "assemblyai_cli/templates/agent.py.tmpl"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
files = ["assemblyai_cli"]
# Third-party deps (assemblyai, sounddevice) ship no type stubs.
ignore_missing_imports = true
disallow_untyped_defs = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "BLE", "C4", "SIM", "RET", "PTH", "ARG", "S", "RUF"]
# E501: line length is owned by the formatter.
# B008: Typer uses function calls (typer.Option/Argument) as parameter defaults.
# S603/S607: we intentionally shell out to `claude`/`npx` with controlled args.
ignore = ["E501", "B008", "S603", "S607"]

[tool.ruff.lint.per-file-ignores]
# Tests assert freely, use throwaway args/temp paths, and don't need pathlib/security lints.
"tests/**" = ["S101", "S108", "ARG001", "ARG002", "ARG005", "PTH123", "SIM117"]
