<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transcribe a pre-recorded file · AssemblyAI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>🎧 Transcribe a pre-recorded file</h1>
    <p class="sub">Transcribe an audio or video URL (or upload a file), then explore speakers, chapters, sentiment, entities, and highlights.</p>

    <div class="card">
      <div class="row">
        <input id="url" type="url" value="https://assembly.ai/wildfires.mp3"
               placeholder="https://example.com/audio.mp3" />
        <button id="go">Transcribe</button>
      </div>
      <div class="or">or</div>
      <label class="upload">
        <input id="file" type="file" accept="audio/*,video/*" hidden />
        Upload an audio or video file
      </label>
    </div>

    <p id="status"></p>

    <div id="ask" class="card" hidden>
      <div class="q">
        <input id="q" type="text" placeholder="Ask a question about this transcript..." />
        <button id="askBtn">Ask</button>
      </div>
      <div id="answer" class="answer"></div>
    </div>

    <div id="tabs" class="tabs"></div>
    <div id="view"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
