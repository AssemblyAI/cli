<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live captions · AssemblyAI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>🎙️ Live captions</h1>
    <p class="sub">Click record and talk — your mic streams to AssemblyAI and transcribes in real time. Audio goes straight from the browser to AssemblyAI with a one-time token; your API key stays on the server.</p>

    <button id="rec">● Record</button>
    <span id="status"></span>

    <div class="caption"><span id="final" class="final"></span><span id="partial" class="partial"></span></div>
  </main>

  <script src="/static/audio.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
