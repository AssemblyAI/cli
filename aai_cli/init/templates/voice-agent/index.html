<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talk to a voice agent · AssemblyAI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="template-page voice-agent-template">
  <main class="app-shell">
    <header class="page-header">
      <h1 class="page-title">Talk to a voice agent</h1>
      <p class="page-subtitle">Click connect and just talk — speech in, LLM reply, speech out, with built-in turn detection and barge-in. The browser connects straight to AssemblyAI's Voice Agent API with a one-time token; your API key stays on the server. (Use headphones for the cleanest result.)</p>
    </header>

    <div class="control-bar">
      <button id="conn" class="button connection-button" data-state="idle">● Connect</button>
      <span id="status" class="status-pill" aria-live="polite"></span>
    </div>

    <div id="log" class="conversation-log"></div>
  </main>

  <script src="/static/audio.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
