# gitleaks config for the assembly CLI secret-scan gate (scripts/check.sh + CI).
#
# Real credentials never live in this repo by design: the API key is stored only in
# the OS keyring (see aai_cli/config.py, KEYRING_SERVICE), never in a dotfile or source
# file. So the only "secrets" gitleaks can legitimately find are the obviously-fake
# placeholder keys used as test fixtures and in planning-doc examples. Allowlist those
# exact values — everything else (real-looking tokens in src/, scripts/, workflows) is
# still scanned and will fail the gate.
[extend]
useDefault = true

[allowlist]
description = "Fake placeholder keys (tests/docs) + gitignored per-developer agent settings"
regexTarget = "match"
regexes = [
  '''sk_abcdef1234''',
  '''sk_zzzzzz9999''',
]
# `gitleaks dir` scans the working tree regardless of .gitignore, so high-entropy values
# in a developer's gitignored `.claude/settings.local.json` (a personal Claude Code file
# that never enters the repo) would fail the *local* gate while CI — which lacks the file
# — passes. Exclude the path so local runs match CI. Tracked `.claude/` files
# (settings.json, agents/, skills/) are not matched and stay scanned.
paths = [
  '''\.claude/settings\.local\.json$''',
]
