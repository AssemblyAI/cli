repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # syrupy indents every line of an .ambr block (blank lines become "  "), so
      # trimming/EOF-fixing those files desyncs them from the live render and breaks
      # the snapshot tests. Leave the generated snapshots alone.
      - id: trailing-whitespace
        exclude: ^tests/__snapshots__/
      - id: end-of-file-fixer
        exclude: ^tests/__snapshots__/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      # Cross-OS filename collisions: this repo ships a macOS Homebrew bottle, so two
      # paths differing only in case would break a case-insensitive checkout.
      - id: check-case-conflict
      # Defense-in-depth alongside gitleaks: never commit a literal private key.
      - id: detect-private-key

  # Spell-check code, comments, and docs (Kubernetes' verify-spelling, generalized).
  # Config (skips + ignore-words) lives in [tool.codespell] in pyproject.toml; check.sh
  # runs the same tool via `uvx codespell`.
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies: [tomli]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Lint the GitHub Actions workflows themselves (the jobs in ci.yml). Both hooks
  # self-scope to .github/workflows/. actionlint-py is the pip-packaged wrapper
  # (bundles the actionlint binary; no Go/Docker), and brings shellcheck-py so
  # embedded `run:` shell is shellcheck'd the same way check.sh checks scripts/check.sh.
  - repo: https://github.com/Mateusz-Grzelinski/actionlint-py
    rev: v1.7.12.24
    hooks:
      - id: actionlint
        additional_dependencies: [shellcheck-py>=0.9.0.5]

  # Security audit for the workflows: catches the Actions-specific smells (unpinned
  # actions, over-broad permissions/tokens, injection-prone expressions) that
  # complement the SHA-pinning + least-privilege posture already in ci.yml.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      # Run through `uv run --frozen` so tests resolve the LOCKED dependency
      # versions (uv.lock), not whatever `pip install -e .` happened to pull. The
      # byte-exact `--help` snapshots are pinned to the locked deps (e.g. the
      # assemblyai SDK's SpeechModel enum); an unpinned `python -m pytest` breaks
      # them the moment an upstream release adds a value.
      - id: pytest
        name: pytest
        # Mirror check.sh: exclude both e2e (real API) and install (real
        # init-template dependency installs — slow, needs network). Running either
        # here would be slow and would reach the network under the locked .venv.
        entry: uv run --frozen python -m pytest -q -m "not e2e and not install"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest-e2e
        name: pytest-e2e (real API; skips without ASSEMBLYAI_API_KEY + kokoro)
        entry: uv run --frozen python -m pytest -q -m e2e
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
