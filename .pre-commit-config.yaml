repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # syrupy indents every line of an .ambr block (blank lines become "  "), so
      # trimming/EOF-fixing those files desyncs them from the live render and breaks
      # the snapshot tests. Leave the generated snapshots alone.
      - id: trailing-whitespace
        exclude: ^tests/__snapshots__/
      - id: end-of-file-fixer
        exclude: ^tests/__snapshots__/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest -q -m "not e2e"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
      - id: pytest-e2e
        name: pytest-e2e (real API; skips without ASSEMBLYAI_API_KEY + kokoro)
        entry: python -m pytest -q -m e2e
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
